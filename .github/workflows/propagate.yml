name: Propagate Release

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo (e.g. punt-labs/biff)"
        required: true
        type: string
      version:
        description: "Release version (e.g. 0.3.0)"
        required: true
        type: string
      tag:
        description: "Git tag (e.g. v0.3.0)"
        required: true
        type: string

permissions: {}

jobs:
  propagate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      INPUT_REPO: ${{ inputs.repo }}
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update marketplace.json
        run: |
          MARKETPLACE=".claude-plugin/marketplace.json"
          if [ ! -f "$MARKETPLACE" ]; then
            echo "No marketplace.json found"
            exit 1
          fi

          # Extract short name from repo (punt-labs/biff → biff)
          export SHORT="${INPUT_REPO#*/}"

          python3 -c "
          import json, os, sys
          path = os.environ['MARKETPLACE']
          version = os.environ['INPUT_VERSION']
          tag = os.environ['INPUT_TAG']
          short = os.environ['SHORT']
          data = json.loads(open(path).read())
          plugins = data.get('plugins', []) if isinstance(data, dict) else data
          found = False
          for p in plugins:
              src = p.get('source', {})
              repo = src.get('repo', '')
              if repo.endswith('/' + short) or p.get('name') == short:
                  p['version'] = version
                  src['ref'] = tag
                  found = True
                  break
          if not found:
              print(f'Warning: no marketplace entry for {short}', file=sys.stderr)
              sys.exit(0)
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print(f'Updated {path}: {short} version={version}, ref={tag}')
          "

          if git diff --quiet "$MARKETPLACE"; then
            echo "No marketplace changes needed"
          else
            git add "$MARKETPLACE"
            git commit -m "chore: bump $SHORT to $INPUT_TAG in marketplace"
            git push origin main
          fi
        env:
          MARKETPLACE: .claude-plugin/marketplace.json
